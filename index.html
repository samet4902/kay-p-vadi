<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kayıp Vadinin Sırrı</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
  #canvas { display: block; width: 100vw; height: 100vh; }

  #ui {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  #score-panel {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 16px;
    padding: 10px 28px; text-align: center; color: #fff;
  }
  #score-panel .label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #aed9a0; }
  #score-panel .value { font-size: 28px; font-weight: 700; line-height: 1.1; }
  #best-panel {
    position: absolute; top: 20px; right: 16px;
    background: rgba(0,0,0,0.35); border-radius: 12px;
    padding: 8px 14px; color: #ffd97d; font-size: 12px; text-align: right;
  }
  #best-panel span { display: block; font-size: 18px; font-weight: 700; color: #fff; }

  /* Mobile controls */
  #controls {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 160px;
    pointer-events: all; display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 0 24px 0; z-index: 20;
  }
  .ctrl-btn {
    width: 90px; height: 90px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.12); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; color: #fff; user-select: none;
    -webkit-tap-highlight-color: transparent; cursor: pointer;
    transition: background 0.1s;
  }
  .ctrl-btn:active { background: rgba(255,255,255,0.3); }
  #btn-left { margin-left: 24px; }
  #btn-right { margin-right: 24px; }
  #btn-jump {
    width: 100px; height: 100px; font-size: 28px;
    background: rgba(100,200,100,0.2); border-color: rgba(100,255,100,0.4);
    margin-bottom: 4px;
  }

  /* Overlays */
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; color: #fff;
  }
  .overlay h1 {
    font-size: clamp(28px, 7vw, 52px); font-weight: 900;
    letter-spacing: 2px; text-align: center;
    background: linear-gradient(135deg, #aed9a0, #ffd97d, #89c4e1);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .overlay .subtitle {
    font-size: 14px; color: rgba(255,255,255,0.55);
    letter-spacing: 4px; text-transform: uppercase; margin-bottom: 36px;
  }
  .big-btn {
    padding: 16px 48px; font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, #3a7d44, #2d6a4f);
    border: none; border-radius: 50px; color: #fff;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 8px 32px rgba(58,125,68,0.5);
    pointer-events: all; margin-top: 8px;
  }
  .big-btn:active { transform: scale(0.96); }
  .stat-row { display: flex; gap: 40px; margin: 20px 0; }
  .stat-box { text-align: center; }
  .stat-box .s-label { font-size: 11px; color: #aed9a0; letter-spacing: 3px; margin-bottom: 4px; }
  .stat-box .s-val { font-size: 32px; font-weight: 800; }
  #game-over-title {
    font-size: clamp(24px,6vw,44px); font-weight: 900;
    color: #ff6b6b; margin-bottom: 4px;
  }
  #instructions {
    font-size: 13px; color: rgba(255,255,255,0.45);
    margin-top: 20px; text-align: center; line-height: 1.9;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="ui">
  <div id="score-panel">
    <div class="label">Mesafe</div>
    <div class="value" id="score-display">0</div>
  </div>
  <div id="best-panel">EN İYİ<span id="best-display">0</span></div>
</div>

<!-- Mobile Controls -->
<div id="controls" class="hidden">
  <div class="ctrl-btn" id="btn-left">◀</div>
  <div class="ctrl-btn" id="btn-jump">▲<br><small style="font-size:10px">ZIRLA</small></div>
  <div class="ctrl-btn" id="btn-right">▶</div>
</div>

<!-- Start Screen -->
<div class="overlay" id="start-screen">
  <h1>KAYIP VADİNİN<br>SIRRI</h1>
  <div class="subtitle">Keşfet · Aş · Kazan</div>
  <div id="instructions">
    ← → Hareket &nbsp;|&nbsp; ↑ / Boşluk Zıpla<br>
    Mobilde ekran butonlarını kullan
  </div>
  <button class="big-btn" id="start-btn">KEŞFE BAŞLA</button>
</div>

<!-- Game Over Screen -->
<div class="overlay hidden" id="gameover-screen">
  <div id="game-over-title">VADİ SONU</div>
  <div class="subtitle">Kaşif düştü…</div>
  <div class="stat-row">
    <div class="stat-box"><div class="s-label">MESAFE</div><div class="s-val" id="go-score">0</div></div>
    <div class="stat-box"><div class="s-label">EN İYİ</div><div class="s-val" id="go-best">0</div></div>
  </div>
  <button class="big-btn" id="restart-btn">TEKRAR DENE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── GLOBAL STATE ─────────────────────────────────────────────
let scene, camera, renderer, clock;
let player, playerGroup;
let running = false;
let score = 0, bestScore = 0;
let speed = 0.18, speedInc = 0.00003;
let lanes = [-2.2, 0, 2.2], currentLane = 1;
let targetX = 0;
let isJumping = false, jumpVel = 0;
let playerY = 0;
const GRAVITY = -0.018;
const JUMP_FORCE = 0.32;

let obstacles = [], collectibles = [], treePool = [], rockPool = [], fogParticles = [];
let chunkZ = 0, lastChunkZ = 0;
let keys = {};
let laneChangeCooldown = 0;

// Body parts for run animation
let leftLeg, rightLeg, leftArm, rightArm, bodyGroup;
let animTime = 0;

// Particles
let particleSystem, particlePositions, particleCount = 60;

// ─── INIT ──────────────────────────────────────────────────────
function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x8ec5a0, 0.038);
  scene.background = new THREE.Color(0x6aadcc);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 4.5, 8);
  camera.lookAt(0, 1, -5);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: false, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.BasicShadowMap;

  clock = new THREE.Clock();

  // Lighting
  const ambient = new THREE.AmbientLight(0xb0d4c0, 0.7);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xfff0c0, 1.2);
  sun.position.set(30, 60, -20);
  sun.castShadow = true;
  sun.shadow.mapSize.set(512, 512);
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far = 150;
  sun.shadow.camera.left = -30;
  sun.shadow.camera.right = 30;
  sun.shadow.camera.top = 30;
  sun.shadow.camera.bottom = -30;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x8ec5e8, 0.4);
  fill.position.set(-20, 10, 10);
  scene.add(fill);

  buildGround();
  buildMountains();
  buildPlayer();
  buildFogParticles();
  buildRiver();
  buildSky();
  spawnInitialEnvironment();

  window.addEventListener('resize', onResize);
  window.addEventListener('keydown', e => { keys[e.code] = true; });
  window.addEventListener('keyup', e => { keys[e.code] = false; });
}

// ─── GROUND ────────────────────────────────────────────────────
function buildGround() {
  const geo = new THREE.PlaneGeometry(10, 400, 1, 1);
  const mat = new THREE.MeshLambertMaterial({ color: 0x4a7c59 });
  const ground = new THREE.Mesh(geo, mat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.z = -180;
  ground.receiveShadow = true;
  scene.add(ground);

  // Path strip
  const pathGeo = new THREE.PlaneGeometry(7.2, 400);
  const pathMat = new THREE.MeshLambertMaterial({ color: 0x7a6650 });
  const path = new THREE.Mesh(pathGeo, pathMat);
  path.rotation.x = -Math.PI / 2;
  path.position.set(0, 0.01, -180);
  path.receiveShadow = true;
  scene.add(path);

  // Lane lines
  for (let lx of [-1.1, 1.1]) {
    const lgeo = new THREE.PlaneGeometry(0.07, 400);
    const lmat = new THREE.MeshLambertMaterial({ color: 0xa08060, transparent: true, opacity: 0.5 });
    const lmesh = new THREE.Mesh(lgeo, lmat);
    lmesh.rotation.x = -Math.PI / 2;
    lmesh.position.set(lx, 0.02, -180);
    scene.add(lmesh);
  }
}

// ─── MOUNTAINS ─────────────────────────────────────────────────
function buildMountains() {
  const mtMat = new THREE.MeshLambertMaterial({ color: 0x3d6b4f });
  const mtMat2 = new THREE.MeshLambertMaterial({ color: 0x2d5040 });
  const snowMat = new THREE.MeshLambertMaterial({ color: 0xddeedd });

  function makeMt(x, z, h, r, mat) {
    const geo = new THREE.ConeGeometry(r, h, 7);
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, h / 2 - 0.5, z);
    scene.add(m);
    // snow cap
    if (h > 18) {
      const sg = new THREE.ConeGeometry(r * 0.3, h * 0.25, 7);
      const sm = new THREE.Mesh(sg, snowMat);
      sm.position.set(x, h * 0.88, z);
      scene.add(sm);
    }
  }

  const positions = [
    [-18, -60, 28, 14], [-14, -100, 34, 16], [-20, -140, 24, 12],
    [-16, -20, 22, 11], [-22, -180, 30, 15],
    [18, -55, 26, 13], [14, -95, 32, 15], [20, -135, 22, 11],
    [16, -15, 20, 10], [22, -175, 28, 14],
    [-10, -80, 18, 9], [10, -120, 20, 10],
  ];
  positions.forEach(([x, z, h, r], i) => makeMt(x, z, h, r, i % 2 === 0 ? mtMat : mtMat2));
}

// ─── RIVER ─────────────────────────────────────────────────────
function buildRiver() {
  const rGeo = new THREE.PlaneGeometry(3, 400);
  const rMat = new THREE.MeshLambertMaterial({ color: 0x4488bb, transparent: true, opacity: 0.75 });
  const river = new THREE.Mesh(rGeo, rMat);
  river.rotation.x = -Math.PI / 2;
  river.position.set(-13, 0.05, -180);
  scene.add(river);
}

// ─── SKY DOME ──────────────────────────────────────────────────
function buildSky() {
  const skyGeo = new THREE.SphereGeometry(190, 16, 8);
  const skyMat = new THREE.MeshBasicMaterial({
    color: 0x87ceeb,
    side: THREE.BackSide
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  scene.add(sky);

  // Sun disc
  const sunGeo = new THREE.SphereGeometry(5, 10, 10);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xfffacd });
  const sunMesh = new THREE.Mesh(sunGeo, sunMat);
  sunMesh.position.set(40, 70, -120);
  scene.add(sunMesh);

  // Clouds
  for (let i = 0; i < 8; i++) {
    const cGroup = new THREE.Group();
    const cMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
    for (let j = 0; j < 3; j++) {
      const cg = new THREE.SphereGeometry(3 + Math.random() * 2, 7, 5);
      const cm = new THREE.Mesh(cg, cMat);
      cm.position.set(j * 3.5 - 3.5, Math.random() * 1.5, 0);
      cGroup.add(cm);
    }
    cGroup.position.set(-30 + Math.random() * 60, 28 + Math.random() * 15, -40 - Math.random() * 100);
    scene.add(cGroup);
  }
}

// ─── PLAYER ────────────────────────────────────────────────────
function buildPlayer() {
  playerGroup = new THREE.Group();
  scene.add(playerGroup);

  bodyGroup = new THREE.Group();
  playerGroup.add(bodyGroup);

  const skinMat = new THREE.MeshLambertMaterial({ color: 0xf4a460 });
  const clothMat = new THREE.MeshLambertMaterial({ color: 0x4a7fa5 });
  const pantsMat = new THREE.MeshLambertMaterial({ color: 0x3a3a5a });
  const hairMat = new THREE.MeshLambertMaterial({ color: 0x3b2a1a });
  const bootMat = new THREE.MeshLambertMaterial({ color: 0x4a3020 });

  // Torso
  const torsoG = new THREE.BoxGeometry(0.55, 0.7, 0.3);
  const torso = new THREE.Mesh(torsoG, clothMat);
  torso.position.y = 1.05;
  torso.castShadow = true;
  bodyGroup.add(torso);

  // Head
  const headG = new THREE.BoxGeometry(0.38, 0.38, 0.38);
  const head = new THREE.Mesh(headG, skinMat);
  head.position.y = 1.62;
  head.castShadow = true;
  bodyGroup.add(head);

  // Hair
  const hairG = new THREE.BoxGeometry(0.4, 0.16, 0.42);
  const hair = new THREE.Mesh(hairG, hairMat);
  hair.position.y = 1.88;
  bodyGroup.add(hair);

  // Eyes (simple dots)
  const eyeG = new THREE.SphereGeometry(0.04, 4, 4);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
  [-0.1, 0.1].forEach(ex => {
    const eye = new THREE.Mesh(eyeG, eyeMat);
    eye.position.set(ex, 1.64, 0.19);
    bodyGroup.add(eye);
  });

  // Arms
  const armG = new THREE.BoxGeometry(0.17, 0.55, 0.17);
  leftArm = new THREE.Mesh(armG, clothMat);
  leftArm.position.set(-0.38, 1.05, 0);
  leftArm.castShadow = true;
  bodyGroup.add(leftArm);

  rightArm = new THREE.Mesh(armG, clothMat);
  rightArm.position.set(0.38, 1.05, 0);
  rightArm.castShadow = true;
  bodyGroup.add(rightArm);

  // Legs
  const legG = new THREE.BoxGeometry(0.2, 0.55, 0.2);
  leftLeg = new THREE.Mesh(legG, pantsMat);
  leftLeg.position.set(-0.17, 0.43, 0);
  leftLeg.castShadow = true;
  bodyGroup.add(leftLeg);

  rightLeg = new THREE.Mesh(legG, pantsMat);
  rightLeg.position.set(0.17, 0.43, 0);
  rightLeg.castShadow = true;
  bodyGroup.add(rightLeg);

  // Boots
  const bootG = new THREE.BoxGeometry(0.22, 0.2, 0.28);
  [-0.17, 0.17].forEach(bx => {
    const boot = new THREE.Mesh(bootG, bootMat);
    boot.position.set(bx, 0.12, 0.04);
    bodyGroup.add(boot);
  });

  // Backpack
  const bpG = new THREE.BoxGeometry(0.32, 0.45, 0.2);
  const bpMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
  const bp = new THREE.Mesh(bpG, bpMat);
  bp.position.set(0, 1.1, -0.24);
  bodyGroup.add(bp);

  playerGroup.position.set(0, 0, 0);
}

// ─── FOG PARTICLES ─────────────────────────────────────────────
function buildFogParticles() {
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 20;
    positions[i * 3 + 1] = Math.random() * 3;
    positions[i * 3 + 2] = -Math.random() * 60;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xaaddcc, size: 0.35, transparent: true, opacity: 0.35,
    sizeAttenuation: true
  });
  particleSystem = new THREE.Points(geo, mat);
  scene.add(particleSystem);
  particlePositions = positions;
}

// ─── ENVIRONMENT SPAWNING ──────────────────────────────────────
function makeTree(x, z) {
  const g = new THREE.Group();
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6b4226 });
  const leafMat = new THREE.MeshLambertMaterial({ color: 0x2d6a2d });
  const leafMat2 = new THREE.MeshLambertMaterial({ color: 0x3a7a30 });

  const trunkG = new THREE.CylinderGeometry(0.12, 0.18, 1.2, 6);
  const trunk = new THREE.Mesh(trunkG, trunkMat);
  trunk.position.y = 0.6;
  trunk.castShadow = true;
  g.add(trunk);

  const leafG = new THREE.ConeGeometry(0.7 + Math.random() * 0.3, 1.6, 7);
  const leaf = new THREE.Mesh(leafG, leafMat);
  leaf.position.y = 2.0;
  leaf.castShadow = true;
  g.add(leaf);

  const leaf2G = new THREE.ConeGeometry(0.5, 1.2, 7);
  const leaf2 = new THREE.Mesh(leaf2G, leafMat2);
  leaf2.position.y = 2.9;
  g.add(leaf2);

  g.position.set(x, 0, z);
  g.rotation.y = Math.random() * Math.PI * 2;
  scene.add(g);
  return g;
}

function makeRock(x, z) {
  const mat = new THREE.MeshLambertMaterial({ color: 0x7a7068 });
  const s = 0.3 + Math.random() * 0.4;
  const geo = new THREE.DodecahedronGeometry(s, 0);
  const rock = new THREE.Mesh(geo, mat);
  rock.position.set(x, s * 0.5, z);
  rock.rotation.set(Math.random(), Math.random(), Math.random());
  rock.castShadow = true;
  scene.add(rock);
  return rock;
}

function spawnInitialEnvironment() {
  for (let z = -5; z > -120; z -= 6) {
    spawnEnvironmentAt(z);
  }
  chunkZ = -120;
}

function spawnEnvironmentAt(z) {
  // Trees on sides
  const treePositions = [
    [-5 - Math.random() * 4, z],
    [5 + Math.random() * 4, z],
  ];
  if (Math.random() > 0.3) treePositions.push([-7 - Math.random() * 3, z - 3]);
  if (Math.random() > 0.3) treePositions.push([7 + Math.random() * 3, z - 3]);
  treePositions.forEach(([x, zp]) => makeTree(x, zp));

  // Occasional rocks on sides
  if (Math.random() > 0.5) makeRock(-4.5 - Math.random() * 2, z + Math.random() * 4 - 2);
  if (Math.random() > 0.5) makeRock(4.5 + Math.random() * 2, z + Math.random() * 4 - 2);
}

// ─── OBSTACLE & COLLECTIBLE SPAWN ─────────────────────────────
function spawnObstacle(z) {
  const laneIdx = Math.floor(Math.random() * 3);
  const x = lanes[laneIdx];
  const type = Math.random();

  let mesh;
  if (type < 0.33) {
    // Boulder
    const mat = new THREE.MeshLambertMaterial({ color: 0x808070 });
    const geo = new THREE.DodecahedronGeometry(0.55, 1);
    mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, 0.55, z);
    mesh.castShadow = true;
  } else if (type < 0.66) {
    // Fallen log
    const mat = new THREE.MeshLambertMaterial({ color: 0x7a5c3a });
    const geo = new THREE.CylinderGeometry(0.22, 0.22, 1.2, 8);
    mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.z = Math.PI / 2;
    mesh.position.set(x, 0.22, z);
    mesh.castShadow = true;
  } else {
    // Thorny bush
    const mat = new THREE.MeshLambertMaterial({ color: 0x556b2f });
    const geo = new THREE.IcosahedronGeometry(0.48, 0);
    mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, 0.48, z);
    mesh.castShadow = true;
  }

  scene.add(mesh);
  obstacles.push({ mesh, lane: laneIdx, z });
}

function spawnCollectible(z) {
  const laneIdx = Math.floor(Math.random() * 3);
  const x = lanes[laneIdx];
  const geo = new THREE.OctahedronGeometry(0.22, 0);
  const mat = new THREE.MeshLambertMaterial({ color: 0xffd700, emissive: 0xaa8800, emissiveIntensity: 0.4 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, 0.8, z);
  scene.add(mesh);
  collectibles.push({ mesh, lane: laneIdx, z, collected: false });
}

// ─── COLLISION ─────────────────────────────────────────────────
function checkCollisions() {
  const px = playerGroup.position.x;
  const pz = playerGroup.position.z;
  const py = playerY;

  for (let obs of obstacles) {
    const dx = Math.abs(px - obs.mesh.position.x);
    const dz = Math.abs(pz - obs.mesh.position.z);
    if (dx < 0.65 && dz < 1.1 && py < 0.8) {
      return true; // Hit!
    }
  }
  return false;
}

function checkCollectibles() {
  const px = playerGroup.position.x;
  const pz = playerGroup.position.z;
  for (let col of collectibles) {
    if (col.collected) continue;
    const dx = Math.abs(px - col.mesh.position.x);
    const dz = Math.abs(pz - col.mesh.position.z);
    if (dx < 0.7 && dz < 1.0) {
      col.collected = true;
      col.mesh.visible = false;
      score += 10;
    }
  }
}

// ─── GAME LOOP ─────────────────────────────────────────────────
let spawnTimer = 0, collectTimer = 0, envTimer = 0;

function update(dt) {
  if (!running) return;

  animTime += dt;
  speed = Math.min(speed + speedInc, 0.55);
  score += Math.floor(speed * 10);

  // Movement scroll
  playerGroup.position.z -= 0;

  // Lane input
  laneChangeCooldown -= dt;
  if (laneChangeCooldown <= 0) {
    if (keys['ArrowLeft'] || keys['KeyA']) {
      if (currentLane > 0) { currentLane--; laneChangeCooldown = 0.22; }
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
      if (currentLane < 2) { currentLane++; laneChangeCooldown = 0.22; }
    }
  }
  if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && !isJumping) {
    isJumping = true;
    jumpVel = JUMP_FORCE;
  }

  // Smooth lane transition
  targetX = lanes[currentLane];
  playerGroup.position.x += (targetX - playerGroup.position.x) * 0.18;

  // Jump physics
  if (isJumping) {
    jumpVel += GRAVITY;
    playerY += jumpVel;
    if (playerY <= 0) { playerY = 0; isJumping = false; jumpVel = 0; }
  }
  playerGroup.position.y = playerY;

  // Run animation
  if (!isJumping) {
    const freq = speed * 25;
    leftLeg.rotation.x = Math.sin(animTime * freq) * 0.55;
    rightLeg.rotation.x = -Math.sin(animTime * freq) * 0.55;
    leftArm.rotation.x = -Math.sin(animTime * freq) * 0.45;
    rightArm.rotation.x = Math.sin(animTime * freq) * 0.45;
    bodyGroup.position.y = Math.abs(Math.sin(animTime * freq * 2)) * 0.05;
  } else {
    leftLeg.rotation.x = 0.2;
    rightLeg.rotation.x = -0.2;
    leftArm.rotation.x = -0.5;
    rightArm.rotation.x = -0.5;
    bodyGroup.position.y = 0;
  }

  // Tilt on lane change
  bodyGroup.rotation.z = (targetX - playerGroup.position.x) * -0.3;

  // Scroll world
  obstacles.forEach(o => o.mesh.position.z += speed);
  collectibles.forEach(c => { if (!c.collected) { c.mesh.position.z += speed; c.mesh.rotation.y += dt * 2; } });

  // Remove out-of-range
  obstacles = obstacles.filter(o => {
    if (o.mesh.position.z > 12) { scene.remove(o.mesh); return false; }
    return true;
  });
  collectibles = collectibles.filter(c => {
    if (c.mesh.position.z > 12) { scene.remove(c.mesh); return false; }
    return true;
  });

  // Spawn
  spawnTimer += speed;
  if (spawnTimer > (5 + Math.random() * 3)) {
    spawnObstacle(-60);
    spawnTimer = 0;
  }
  collectTimer += speed;
  if (collectTimer > (3 + Math.random() * 2)) {
    spawnCollectible(-55);
    collectTimer = 0;
  }

  // Scroll env objects (trees, rocks)
  scene.children.forEach(child => {
    if (child.userData.envObj) {
      child.position.z += speed;
      if (child.position.z > 15) { child.position.z -= 130; }
    }
  });

  // Move ground & path - handled via scene scroll feel
  scene.children.forEach(child => {
    if (child.userData.groundScroll) {
      child.position.z += speed;
      if (child.position.z > 20) child.position.z -= 400;
    }
  });

  // Fog particles
  for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3 + 2] += speed * 0.5;
    if (particlePositions[i * 3 + 2] > 10) {
      particlePositions[i * 3 + 2] = -60;
      particlePositions[i * 3] = (Math.random() - 0.5) * 22;
      particlePositions[i * 3 + 1] = Math.random() * 4;
    }
  }
  particleSystem.geometry.attributes.position.needsUpdate = true;

  // Camera subtle bob
  camera.position.y = 4.5 + Math.sin(animTime * (speed * 20)) * 0.04;

  // Collectible pickup
  checkCollectibles();

  // Collision
  if (checkCollisions()) {
    gameOver();
    return;
  }

  // Score display
  document.getElementById('score-display').textContent = score;
}

// ─── RENDER LOOP ───────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
}

// ─── GAME CONTROL ──────────────────────────────────────────────
function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  document.getElementById('controls').classList.remove('hidden');

  // Reset
  score = 0;
  speed = 0.18;
  currentLane = 1;
  targetX = 0;
  playerGroup.position.set(0, 0, 0);
  playerY = 0;
  isJumping = false;
  jumpVel = 0;
  laneChangeCooldown = 0;
  animTime = 0;
  spawnTimer = 0;
  collectTimer = 0;

  // Clear obstacles
  obstacles.forEach(o => scene.remove(o.mesh));
  collectibles.forEach(c => scene.remove(c.mesh));
  obstacles = [];
  collectibles = [];

  running = true;
}

function gameOver() {
  running = false;
  if (score > bestScore) bestScore = score;
  document.getElementById('best-display').textContent = bestScore;
  document.getElementById('go-score').textContent = score;
  document.getElementById('go-best').textContent = bestScore;
  document.getElementById('gameover-screen').classList.remove('hidden');
  document.getElementById('controls').classList.add('hidden');
}

// ─── RESIZE ────────────────────────────────────────────────────
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ─── MOBILE TOUCH CONTROLS ─────────────────────────────────────
function setupTouch() {
  const btnLeft = document.getElementById('btn-left');
  const btnRight = document.getElementById('btn-right');
  const btnJump = document.getElementById('btn-jump');

  function holdKey(code) {
    keys[code] = true;
    setTimeout(() => { keys[code] = false; }, 200);
  }

  btnLeft.addEventListener('touchstart', e => { e.preventDefault(); holdKey('ArrowLeft'); }, { passive: false });
  btnRight.addEventListener('touchstart', e => { e.preventDefault(); holdKey('ArrowRight'); }, { passive: false });
  btnJump.addEventListener('touchstart', e => { e.preventDefault(); holdKey('Space'); }, { passive: false });
  btnLeft.addEventListener('mousedown', () => holdKey('ArrowLeft'));
  btnRight.addEventListener('mousedown', () => holdKey('ArrowRight'));
  btnJump.addEventListener('mousedown', () => holdKey('Space'));

  // Swipe detection
  let touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!running) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
      holdKey(dx < 0 ? 'ArrowLeft' : 'ArrowRight');
    } else if (dy < -40) {
      holdKey('Space');
    }
  }, { passive: true });
}

// ─── BUTTON EVENTS ─────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// ─── BOOTSTRAP ─────────────────────────────────────────────────
init();
setupTouch();

// Tag environment objects for scrolling
scene.children.forEach(child => {
  const p = child.position;
  if (p.z < -3 && (child.type === 'Group' || (child.isMesh && child.geometry && child.geometry.type !== 'PlaneGeometry'))) {
    if (Math.abs(p.x) > 3.5) child.userData.envObj = true;
  }
});

animate();
</script>
